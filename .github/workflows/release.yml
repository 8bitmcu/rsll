name: Compile and Package Binaries

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: rsll
            asset_name: rsll-linux-amd64
          - os: windows-latest
            artifact_name: rsll.exe
            asset_name: rsll-windows-amd64.exe
          - os: macos-latest
            artifact_name: rsll
            asset_name: rsll-macos-universal

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Compile Binary
        run: cargo build --release

      - name: Prepare Binary Artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir dist
          cp target/release/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

      - name: Prepare Binary Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          copy target\release\${{ matrix.artifact_name }} dist\${{ matrix.asset_name }}

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

      - name: Update 'Latest' Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Master Build
          draft: false
          prerelease: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
